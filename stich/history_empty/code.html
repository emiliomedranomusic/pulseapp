<!DOCTYPE html>

                    "on-error-container": "#93000a",

                    "surface-variant": "#e8def8",
                    "surface-bright": "#fdf7ff",
                    "on-primary-container": "#752409",
                    "inverse-on-surface": "#f6eeff",
                    "on-primary-fixed": "#3a0a00",
                    "tertiary-fixed-dim": "#a7cfbc",

<style>
        body {
            background-color: #fdf7ff; /* Warm Cream/Background from config */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-glow {
            filter: drop-shadow(0 0 20px rgba(100, 85, 145, 0.1));
        }
        .bento-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .bento-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -10px rgba(100, 85, 145, 0.12);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-on-surface">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-background dark:bg-background flex items-center justify-between px-margin-mobile h-20">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary" style="font-size: 28px;">cloud</span>
<h1 class="font-display text-display text-secondary dark:text-secondary-fixed tracking-tight">Pulse</h1>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-on-surface-variant hover:opacity-80 active:scale-95 transition-transform duration-200 p-2">notifications</button>
<button class="material-symbols-outlined text-on-surface-variant hover:opacity-80 active:scale-95 transition-transform duration-200 p-2">settings</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pb-32">
<div class="max-w-md w-full text-center space-y-stack-lg">
<!-- Header Text -->
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface md:font-headline-lg md:text-headline-lg">
                Looking back
            </h2>
<!-- Mascot Container with Animated Background -->
<div class="relative flex justify-center py-stack-md">
<div class="absolute inset-0 bg-secondary-container/20 rounded-full blur-3xl transform scale-75 opacity-50 animate-pulse"></div>
<img alt="Pulse wellness mascot: a small round pastel lavender cloud-blob creature looking gentle and curious" class="relative w-64 h-64 object-contain soft-glow animate-bounce-slow" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCBQ5YGu0V2r-fP2-T6TxTNybvmspR3FP1_7fPfdO3xI2yvn7azxHIesOM5izJKh0Dmr9vkruF-xTw9mJ7G9oh_OJNujS2R_XLx8b2C-4Iobb4Tnv1RTDJhrTyleDFYXCPfGj_1chtHhEqk2fET0aOLQswJQlbPbTTX52nisVkNuQKDaE7xWJwpW02CcatRZqHud4ujf-vKljumU_WPgw13uUm5DRZnrheShVIRP8k9OrEkAhqEnzWo1fRnlZjsxjMQ7b26kz4yXHaI" style="animation: bounce-slow 4s ease-in-out infinite;"/>
</div>
<!-- Empty State Message -->
<div class="space-y-stack-sm px-4">
<p class="font-headline-md text-headline-md text-on-secondary-container">
                    No entries yet — your story starts today.
                </p>
<p class="font-body-lg text-body-lg text-on-surface-variant opacity-70">
                    Take a moment to check in with yourself. Every small reflection is a step towards understanding.
                </p>
</div>
<!-- Action Area (Bento-style CTA) -->
<div class="pt-stack-md">
<button class="w-full h-14 bg-primary text-on-primary font-label-lg text-label-lg rounded-full shadow-lg hover:opacity-90 active:scale-95 transition-all duration-300 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">add_circle</span>
                    Create Your First Entry
                </button>
</div>
<!-- Suggestion Grid (Asymmetric Bento) -->
<div class="grid grid-cols-2 gap-4 mt-stack-lg">
<div class="col-span-1 bento-card p-stack-md bg-surface-container rounded-lg flex flex-col items-start gap-2 cursor-pointer">
<span class="material-symbols-outlined text-primary" data-weight="fill">lightbulb</span>
<span class="font-label-md text-label-md text-left">Daily Prompt</span>
</div>
<div class="col-span-1 bento-card p-stack-md bg-tertiary-container/20 rounded-lg flex flex-col items-start gap-2 cursor-pointer">
<span class="material-symbols-outlined text-tertiary" data-weight="fill">mood</span>
<span class="font-label-md text-label-md text-left">Quick Mood Log</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-surface dark:bg-surface-dim shadow-[0_-10px_40px_0_rgba(100,85,145,0.08)]">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-secondary p-2 hover:bg-secondary-fixed-dim/20 rounded-full active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-lg text-label-lg">Home</span>
</a>
<!-- Mood -->
<a class="flex flex-col items-center justify-center text-secondary p-2 hover:bg-secondary-fixed-dim/20 rounded-full active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined">face</span>
<span class="font-label-lg text-label-lg">Mood</span>
</a>
<!-- Log (Active: Closest match to 'Look back' history logic/context of the page) -->
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-6 py-2 active:scale-90 transition-all duration-300 shadow-md" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">edit_note</span>
<span class="font-label-lg text-label-lg">Log</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-secondary p-2 hover:bg-secondary-fixed-dim/20 rounded-full active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label-lg text-label-lg">Profile</span>
</a>
</nav>
<script>
        // Simple bounce-slow keyframe injection
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes bounce-slow {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-15px); }
            }
        `;
        document.head.appendChild(style);

        // Micro-interaction for bento cards
        document.querySelectorAll('.bento-card').forEach(card => {
            card.addEventListener('click', () => {
                card.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    card.style.transform = '';
                }, 150);
            });
        });
    </script>
</body></html>
